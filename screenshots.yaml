  #
  # Globex:
  #   phone: iphone15
  #   screenshots:
  #     - source: screenshots/globex/dashboard.png
  #       output: 01_dashboard.png

  # Quick local test against assets/phones/phone.png.
  # Drop a PNG at assets/screenshots/test/sample.png and run ./start.sh
  TestBrand:
    phone: test_phone
    background_color: [240, 240, 240, 255]
    screenshots:
      - source: screenshots/IMG_3677.PNG
        output: 01_test.png
        labels:
          - text: "Hello, world!"
            position: [724, 60]
            font_size: 48
            color: "#0B2545"
            shadow_color: "#00000055"
            shadow_offset: [2, 2]
            anchor: "mm"
