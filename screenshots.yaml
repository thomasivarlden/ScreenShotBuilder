# Screenshot Builder — example configuration
#
# Two top-level sections:
#   phones:  reusable phone definitions (base image + display corners)
#   brands:  one section per brand; each brand picks a phone (or several)
#            and supplies its own screenshots, labels, stamps.
#
# All file paths are relative to the assets/ folder.
#
# Recommended assets/ layout:
#   assets/
#     phones/        base images (hand+phone PNGs, transparent display)
#     screenshots/<brand>/   plain app screenshots
#     logos/<brand>/         stamp images
#     fonts/                 optional .ttf/.otf

# ----- Phones (reusable) --------------------------------------------------
phones:

  iphone15:
    base_image: phones/iphone15.png
    # The four corners of the phone's display area, in pixel coordinates
    # of the base image. Order matters.
    screen_corners:
      top_left:     [310, 240]
      top_right:    [930, 270]
      bottom_right: [915, 1820]
      bottom_left:  [295, 1790]

  iphone15pro:
    base_image: phones/iphone15pro.png
    screen_corners:
      top_left:     [320, 250]
      top_right:    [940, 280]
      bottom_right: [925, 1830]
      bottom_left:  [305, 1800]

  # Local test phone — uses assets/phones/phone.png (1448 x 1086).
  # Display-area corners (clockwise from top-left).
  test_phone:
    base_image: phones/phone.png
    screen_corners:
      top_left:     [520, 230]
      top_right:    [805, 250]
      bottom_right: [780, 886]
      bottom_left:  [500, 838]

# ----- Brands -------------------------------------------------------------
# The AcmeInc and Globex blocks below are documentation-only examples that
# reference phones (iphone15) and assets you don't have locally — they're
# left commented-out so the example file shows the full schema without
# breaking a real run.
brands:

  # AcmeInc:
  #   phone: iphone15                          # or phones: [iphone15, iphone15pro]
  #   output_size: [1242, 2688]                # optional final resize
  #   background_color: [255, 255, 255, 0]
  #   post_process:
  #     crop:
  #       margins: [0, 0, 0, 0]                # or box: [l,t,r,b] / center: [w,h]
  #     adjust:
  #       brightness: 1.0
  #       contrast:   1.05
  #       saturation: 1.10
  #       sharpness:  1.0
  #       grayscale:  false
  #   screenshots:
  #     - source: screenshots/acme/home.png
  #       output: 01_home.png
  #       labels:
  #         - text: "Catch more fish"
  #           position: [621, 120]
  #           font: fonts/Inter-Bold.ttf
  #           font_size: 84
  #           color: "#0B2545"
  #           shadow_color: "#00000055"
  #           shadow_offset: [3, 3]
  #           anchor: "mm"
  #       stamps:
  #         - source: logos/acme/logo.png
  #           position: [40, 40]
  #           scale: 0.5
  #     - source: screenshots/acme/map.png
  #       output: 02_map.png
  #
  # Globex:
  #   phone: iphone15
  #   screenshots:
  #     - source: screenshots/globex/dashboard.png
  #       output: 01_dashboard.png

  # Quick local test against assets/phones/phone.png.
  # Drop a PNG at assets/screenshots/test/sample.png and run ./start.sh
  TestBrand:
    phone: test_phone
    background_color: [240, 240, 240, 255]
    screenshots:
      - source: screenshots/IMG_3677.PNG
        output: 01_test.png
        labels:
          - text: "Hello, world!"
            position: [724, 60]
            font_size: 48
            color: "#0B2545"
            shadow_color: "#00000055"
            shadow_offset: [2, 2]
            anchor: "mm"
