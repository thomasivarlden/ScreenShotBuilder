# Screenshot Builder — example configuration
#
# Two top-level sections:
#   phones:  reusable phone definitions (base image + display corners)
#   brands:  one section per brand; each brand picks a phone (or several)
#            and supplies its own screenshots, labels, stamps.
#
# All file paths are relative to the assets/ folder.
#
# Recommended assets/ layout:
#   assets/
#     phones/        base images (hand+phone PNGs, transparent display)
#     screenshots/<brand>/   plain app screenshots
#     logos/<brand>/         stamp images
#     fonts/                 optional .ttf/.otf

# ----- Phones (reusable) --------------------------------------------------
# Corners are pixel coordinates of the base image (clockwise from top-left).
# All entries below except `test_phone` start with placeholder corners
# (5x-scaled from test_phone). Open each in editor.sh and refine per phone.
phones:

  test_phone:
    # Small preview render of one of the b* phones (1448 x 1086).
    base_image: phones/phone.png
    screen_corners:
      top_left: [522, 239]
      top_right: [803, 251]
      bottom_right: [784, 866]
      bottom_left: [492, 854]

  a1:
    base_image: phones/a1.png   # 7240 x 5430
    screen_corners:
      top_left:
        - 2288
        - 767
      top_right:
        - 4072
        - 855
      bottom_right:
        - 3676
        - 4712
      bottom_left:
        - 1946
        - 4480

